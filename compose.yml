services:
  mysql:
    image: mysql:8.4
    container_name: impulsosocial-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_local_password
      MYSQL_DATABASE: impulsosocial
      MYSQL_USER: impulsosocial
      MYSQL_PASSWORD: impulsosocial_local_password
    ports:
      - "3306:3306"
    volumes:
      - impulsosocial_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uimpulsosocial -pimpulsosocial_local_password --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  impulsosocial_mysql_data: